name: Panel Emulator CI

on:
  push:
    paths:
      - "tools/panel-emulator/**"
      - ".github/workflows/panel-emulator.yml"
  pull_request:
    paths:
      - "tools/panel-emulator/**"
      - ".github/workflows/panel-emulator.yml"

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/panel-emulator/package.json

      - name: Install dependencies
        working-directory: tools/panel-emulator
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        working-directory: tools/panel-emulator
        run: npm test
