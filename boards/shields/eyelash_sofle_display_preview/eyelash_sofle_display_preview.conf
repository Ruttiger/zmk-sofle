# Display preview shield for native_sim/native/64.
# Renders the ZMK built-in status screen in an SDL window via WSLg or X11.
# Run via: scripts/Preview-Display.ps1

# --- Display ---
CONFIG_ZMK_DISPLAY=y
CONFIG_SDL_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096

# Built-in ZMK status screen (battery %, BLE profiles, layer).
# Switch to CUSTOM if/when a nice!view-compatible widget is wired in.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# --- Input (mock — no real GPIO matrix) ---
# ZMK_KSCAN_MOCK_DRIVER is auto-enabled by the DTS zmk,kscan-mock node; do not set manually.

# --- Wireless: disabled on native_sim ---
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT=n

# --- Unused hardware features ---
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n
CONFIG_ZMK_POINTING=n
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_PM_SOFT_OFF=n
CONFIG_EC11=n
CONFIG_ZMK_EXT_POWER=n
