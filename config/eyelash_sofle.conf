CONFIG_BT_DEVICE_NAME="Eyelash Sofle BT"
CONFIG_BT_DEVICE_NAME_MAX=20

# Sleep after 30 mins (30*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_SLEEP=y
#soft off
CONFIG_ZMK_PM_SOFT_OFF=y

# MOUSE
CONFIG_ZMK_POINTING=y

# Enables a combination of settings that are planned to be default in future
# versions of ZMK to improve connection stability. This includes changes to
# timing on BLE pairing initiation, restores use of the updated/new LLCP
# implementation, and disables 2M PHY support.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Report type NKRO enabled
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Display config - zmk-nice-oled (SSD1306 OLED via I2C)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_SSD1306=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# TEST PATTERN: disabled after calibration confirmed full 128x64 coverage
CONFIG_NICE_OLED_TEST_PATTERN=n

# SSD1306 128x64 display fixes (zmk-nice-oled defaults target nice!view 160x68)
# Invert colors: black background, white foreground (OLED power-efficient)
CONFIG_NICE_OLED_WIDGET_INVERTED=y
# Canvas portrait dimensions that produce correct 128x64 landscape after 90° rotation
CONFIG_NICE_OLED_CUSTOM_CANVAS_WIDTH=64
CONFIG_NICE_OLED_CUSTOM_CANVAS_HEIGHT=128
# Widget position fixes — defaults were designed for 68x160 canvas (nice!view)
# Luna: sprite is 32px wide; X=32 places it fully within 64px canvas (portrait_x 32..63)
# After 90°CW rotation: physical_y = 63-32 = 31 (upper half), physical_x = LUNA_Y (left area)
CONFIG_NICE_OLED_WIDGET_LUNA_CUSTOM_X=32
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=112
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=105
# Cat animation (right/peripheral half): positions for 270°CCW rotation
# 270° mapping: portrait(x,y) -> physical(127-y, x)
# X=0 -> cat fills physical_y 0..63 (full height, 5px clipped from 69px width)
# Y=60 -> cat occupies physical_x 67..0 (left side), leaving x=67..127 for output/battery
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_Y=60

# zmk-nice-oled widgets
CONFIG_NICE_OLED_ON=y
# WPM gauge (speedometer) + Luna animation reacting to typing speed and CapsLock
CONFIG_ZMK_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
# Active layer name
CONFIG_NICE_OLED_WIDGET_LAYER=y
# Modifier keys indicator (Ctrl/Shift/Alt/GUI)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
# HID indicators (CapsLock etc.)
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
# Peripheral: cat animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y
# Show sleep art when keyboard goes idle
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_SLEEP=y

# Report battery peripheral battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# The EC11 driver must use interrupts; otherwise the encoder node is present
# but rotation does not emit events.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
