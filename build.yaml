---
include:
  # Experimental Ruttiger Eyelash Sofle standalone build.
  # Left half is central and keeps ZMK Studio enabled.
  - board: nice_nano_v2
    shield: eyelash_sofle_central_left nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
    artifact-name: ruttiger_eyelash_sofle_standalone_left

  # Right half is peripheral and keeps the right-side joystick matrix column.
  - board: nice_nano_v2
    shield: eyelash_sofle_peripheral_right nice_view
    artifact-name: ruttiger_eyelash_sofle_standalone_right

  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: ruttiger_eyelash_sofle_settings_reset
