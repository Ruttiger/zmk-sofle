---
include:
  # Native eyelash_sofle ARM boards with SSD1306 OLED (I2C).
  # Display config is in the shield overlays (ssd1306fb, i2c0, disable spi0).
  - board: eyelash_sofle_left
    shield: eyelash_sofle_central_left nice_oled
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: ruttiger_eyelash_sofle_standalone_left

  - board: eyelash_sofle_right
    shield: eyelash_sofle_peripheral_right nice_oled
    artifact-name: ruttiger_eyelash_sofle_standalone_right

  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: ruttiger_eyelash_sofle_settings_reset
