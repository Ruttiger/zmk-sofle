<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED Panel Emulator — Sofle ZMK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>OLED Panel Emulator</h1>
      <div class="header-meta">
        <span class="status-dot" id="statusDot" title="Server connection"></span>
        <span class="status-label" id="statusLabel">connecting…</span>
        <button id="btnReloadAssets" class="btn-sm" title="Reload assets.json and source files">⟳ Reload assets</button>
      </div>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="assets">Asset Viewer</button>
    <button class="tab-btn" data-tab="state">Live Preview</button>
  </nav>

  <main>

    <!-- ================================================================ -->
    <!-- TAB: Asset Viewer                                                  -->
    <!-- ================================================================ -->
    <section id="tab-assets" class="tab-pane active">
      <div class="pane-layout">

        <!-- Left: controls -->
        <aside class="controls-col">
          <fieldset>
            <legend>Asset</legend>
            <label>Select asset
              <select id="assetSelect">
                <option value="">— none —</option>
              </select>
            </label>

            <div class="local-load-row">
              <button class="btn-sm btn-local-load" id="btnLoadLocalAV" title="Parse a .c asset file and add it to the list">📂 Load .c</button>
            </div>

            <label>Bitmap format
              <select id="formatSelect">
                <option value="lvgl-indexed-1bit">lvgl-indexed-1bit (LVGL 1bpp horiz MSB + palette)</option>
                <option value="mono-horizontal-msb">mono-horizontal-msb</option>
                <option value="mono-horizontal-lsb">mono-horizontal-lsb</option>
                <option value="mono-vertical-pages-lsb">mono-vertical-pages-lsb (OLED pages, LSB=top)</option>
                <option value="mono-vertical-pages-msb">mono-vertical-pages-msb (OLED pages, MSB=top)</option>
                <option value="mono-packed-rows">mono-packed-rows (= horiz MSB)</option>
                <option value="mono-packed-columns">mono-packed-columns (= vert pages LSB)</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>Frame</legend>
            <label>Frame
              <input type="number" id="frameInput" min="0" value="0" style="width:4em" />
              <span id="frameTotal">/ 0</span>
            </label>
            <div class="row-controls">
              <button id="btnPrevFrame">◀</button>
              <button id="btnPlayPause">▶ Play</button>
              <button id="btnNextFrame">▶</button>
            </div>
            <label>FPS
              <input type="range" id="fpsRange" min="1" max="60" value="8" />
              <span id="fpsValue">8</span>
            </label>
          </fieldset>

          <fieldset>
            <legend>Display</legend>
            <label>Zoom
              <input type="range" id="zoomRange" min="1" max="16" value="4" />
              <span id="zoomValue">4×</span>
            </label>
            <label class="row-label">
              <input type="checkbox" id="chkGrid" />
              Show pixel grid
            </label>
            <label class="row-label">
              <input type="checkbox" id="chkInvert" />
              Invert colors
            </label>
            <label class="row-label">
              <input type="checkbox" id="chkMirrorH" />
              Mirror horizontal
            </label>
            <label class="row-label">
              <input type="checkbox" id="chkMirrorV" />
              Mirror vertical
            </label>
            <label>Canvas rotation
              <select id="rotationSelect">
                <option value="0">0°</option>
                <option value="90">90°</option>
                <option value="180">180°</option>
                <option value="270">270°</option>
              </select>
            </label>
            <label class="row-label">
              <input type="checkbox" id="chkBoundingBox" />
              Bounding box
            </label>
            <label>Pixel on color
              <input type="color" id="colorOn" value="#00ff88" />
            </label>
            <label>Background color
              <input type="color" id="colorBg" value="#000000" />
            </label>
          </fieldset>

          <!-- Asset info -->
          <fieldset id="assetInfo" class="info-panel">
            <legend>Asset info</legend>
            <div id="assetInfoContent"><em>No asset selected</em></div>
          </fieldset>
        </aside>

        <!-- Right: canvas + warnings -->
        <div class="canvas-col">
          <div class="oled-wrap" id="assetOledWrap">
            <canvas id="assetCanvas"></canvas>
          </div>
          <div class="warnings-box" id="assetWarnings"></div>
        </div>
      </div>
    </section>

    <!-- ================================================================ -->
    <!-- TAB: Live Preview (merged Panel Preview + Keyboard State)          -->
    <!-- ================================================================ -->
    <section id="tab-state" class="tab-pane">
      <div class="live-preview-layout">

        <!-- LEFT: OLED canvases (left + right halves) + placement controls -->
        <aside class="preview-sidebar">

          <div class="local-load-row">
            <button class="btn-sm btn-local-load" id="btnLoadLocalLP" title="Parse a .c asset file and add it to both selectors">📂 Load .c</button>
          </div>

          <div class="preview-halves">

            <!-- Left half -->
            <div class="oled-half">
              <div class="oled-half-header">
                <span class="oled-label">Left (128×64)</span>
                <div class="orient-btns" id="orientBtnsLeft">
                  <button class="orient-btn active" data-orient="landscape" title="Landscape">⬚</button>
                  <button class="orient-btn" data-orient="cw"        title="Portrait 90° CW">↷</button>
                  <button class="orient-btn" data-orient="ccw"       title="Portrait 90° CCW">↶</button>
                </div>
              </div>
              <div class="oled-stage" id="stageLeft">
                <div class="oled-wrap">
                  <canvas id="panelCanvasLeft"></canvas>
                </div>
              </div>
              <fieldset class="half-controls">
                <legend>Left — asset</legend>
                <label>
                  <select id="panelAssetSelectLeft">
                    <option value="">— none —</option>
                  </select>
                </label>
                <div class="xy-row">
                  <label>X <input type="number" id="panelXLeft"  value="0" min="-255" max="255" style="width:4em" /></label>
                  <label>Y <input type="number" id="panelYLeft"  value="0" min="-255" max="255" style="width:4em" /></label>
                </div>
                <label>Anchor
                  <select id="panelAnchorLeft">
                    <option value="top-left">top-left</option>
                    <option value="top-right">top-right</option>
                    <option value="center">center</option>
                    <option value="bottom-left">bottom-left</option>
                    <option value="bottom-right">bottom-right</option>
                  </select>
                </label>
                <label class="row-label"><input type="checkbox" id="panelClearLeft"   checked /> Clear before</label>
                <label class="row-label"><input type="checkbox" id="panelClipLeft"            /> Clipping</label>
                <label class="row-label"><input type="checkbox" id="panelInvertLeft"          /> Invert</label>
              </fieldset>
            </div>

            <!-- Right half -->
            <div class="oled-half">
              <div class="oled-half-header">
                <span class="oled-label">Right (128×64)</span>
                <div class="orient-btns" id="orientBtnsRight">
                  <button class="orient-btn active" data-orient="landscape" title="Landscape">⬚</button>
                  <button class="orient-btn" data-orient="cw"        title="Portrait 90° CW">↷</button>
                  <button class="orient-btn" data-orient="ccw"       title="Portrait 90° CCW">↶</button>
                </div>
              </div>
              <div class="oled-stage" id="stageRight">
                <div class="oled-wrap">
                  <canvas id="panelCanvasRight"></canvas>
                </div>
              </div>
              <fieldset class="half-controls">
                <legend>Right — asset</legend>
                <label>
                  <select id="panelAssetSelectRight">
                    <option value="">— none —</option>
                  </select>
                </label>
                <div class="xy-row">
                  <label>X <input type="number" id="panelXRight" value="0" min="-255" max="255" style="width:4em" /></label>
                  <label>Y <input type="number" id="panelYRight" value="0" min="-255" max="255" style="width:4em" /></label>
                </div>
                <label>Anchor
                  <select id="panelAnchorRight">
                    <option value="top-left">top-left</option>
                    <option value="top-right">top-right</option>
                    <option value="center">center</option>
                    <option value="bottom-left">bottom-left</option>
                    <option value="bottom-right">bottom-right</option>
                  </select>
                </label>
                <label class="row-label"><input type="checkbox" id="panelClearRight"  checked /> Clear before</label>
                <label class="row-label"><input type="checkbox" id="panelClipRight"           /> Clipping</label>
                <label class="row-label"><input type="checkbox" id="panelInvertRight"         /> Invert</label>
              </fieldset>
            </div>

          </div>

          <!-- Shared display controls -->
          <fieldset>
            <legend>Display</legend>
            <label>Zoom
              <input type="range" id="panelZoom" min="1" max="8" value="3" />
              <span id="panelZoomValue">3×</span>
            </label>
            <label class="row-label">
              <input type="checkbox" id="panelGrid" />
              Show grid
            </label>
          </fieldset>

        </aside>

        <!-- RIGHT: State controls -->
        <div class="state-area">
          <div class="state-layout">

            <div class="state-col">
              <fieldset>
                <legend>Battery</legend>
                <label>Left <span id="battLeftVal">87</span>%
                  <input type="range" id="battLeft" min="0" max="100" value="87" />
                </label>
                <label>Right <span id="battRightVal">84</span>%
                  <input type="range" id="battRight" min="0" max="100" value="84" />
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkCharging" />
                  Charging
                </label>
              </fieldset>

              <fieldset>
                <legend>Connection</legend>
                <label>Output
                  <select id="outputSelect">
                    <option value="BLE">BLE</option>
                    <option value="USB">USB</option>
                  </select>
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkUsb" />
                  USB connected
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkBle" checked />
                  BLE connected
                </label>
                <label>BLE profile
                  <input type="number" id="bleProfile" min="0" max="4" value="0" style="width:3em" />
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkAdv" />
                  Advertising
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkPairing" />
                  Pairing
                </label>
              </fieldset>

              <fieldset>
                <legend>Split</legend>
                <label class="row-label">
                  <input type="checkbox" id="chkSplitL" checked />
                  Left connected
                </label>
                <label class="row-label">
                  <input type="checkbox" id="chkSplitR" checked />
                  Right connected
                </label>
                <label>Link quality
                  <select id="linkQuality">
                    <option value="ok">ok</option>
                    <option value="degraded">degraded</option>
                    <option value="disconnected">disconnected</option>
                  </select>
                </label>
              </fieldset>
            </div>

            <div class="state-col">
              <fieldset>
                <legend>Layer</legend>
                <div id="layerButtons" class="layer-buttons"></div>
              </fieldset>

              <fieldset>
                <legend>Modifiers</legend>
                <div class="mod-grid">
                  <label class="row-label"><input type="checkbox" data-mod="ctrl"  /> Ctrl</label>
                  <label class="row-label"><input type="checkbox" data-mod="shift" /> Shift</label>
                  <label class="row-label"><input type="checkbox" data-mod="alt"   /> Alt</label>
                  <label class="row-label"><input type="checkbox" data-mod="gui"   /> GUI</label>
                </div>
              </fieldset>

              <fieldset>
                <legend>Locks</legend>
                <label class="row-label"><input type="checkbox" data-lock="caps"   /> Caps Lock</label>
                <label class="row-label"><input type="checkbox" data-lock="num"    /> Num Lock</label>
                <label class="row-label"><input type="checkbox" data-lock="scroll" /> Scroll Lock</label>
              </fieldset>

              <fieldset>
                <legend>Power</legend>
                <label class="row-label"><input type="checkbox" id="chkIdle" />    Idle</label>
                <label class="row-label"><input type="checkbox" id="chkSleep" />   Sleep</label>
                <label class="row-label"><input type="checkbox" id="chkSoftOff" /> Soft-off</label>
              </fieldset>

              <fieldset>
                <legend>WPM &amp; activity</legend>
                <label>WPM <span id="wpmVal">0</span>
                  <input type="range" id="wpmRange" min="0" max="200" value="0" />
                </label>
                <label>Activity <span id="actVal">0</span>
                  <input type="range" id="actRange" min="0" max="100" value="0" />
                </label>
              </fieldset>
            </div>

            <div class="state-col">
              <fieldset>
                <legend>Keyboard input</legend>
                <div class="row-controls" style="margin-bottom:.5rem">
                  <button id="btnKeyCapture" class="btn-toggle">Capture keyboard</button>
                  <button id="btnClearKeys">Clear pressed</button>
                  <button id="btnResetState">Reset all state</button>
                </div>
                <label>Send key tap
                  <div style="display:flex;gap:.4rem">
                    <input type="text" id="tapKeyInput" placeholder="e.g. A" style="width:5rem" />
                    <button id="btnTapKey">Tap</button>
                  </div>
                </label>
                <div id="pressedKeys" class="pressed-keys"><em>No keys pressed</em></div>
                <div class="state-json-box" id="stateJson"></div>
              </fieldset>
            </div>

          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Shared hidden file input for local .c loading -->
  <input type="file" id="cFileInput" accept=".c" style="display:none" />

  <!-- Symbol picker dialog (shown when a .c file contains multiple symbols) -->
  <dialog id="symbolPickerDialog">
    <form method="dialog">
      <p class="dialog-title">Multiple symbols found — pick one:</p>
      <select id="symbolPickerSelect" size="6"></select>
      <div class="dialog-actions">
        <button value="cancel" class="btn-sm">Cancel</button>
        <button id="btnSymbolPickerUse" class="btn-sm btn-accent" value="use">Use symbol</button>
      </div>
    </form>
  </dialog>

  <script src="app.js" type="module"></script>
</body>
</html>
